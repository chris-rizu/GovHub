<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>GovHub Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    .admin-shell-bg { background: linear-gradient(180deg, #0a0f1c 0%, #0f172a 100%); }
    html.light .admin-shell-bg { background: #ffffff; }
  </style>

  <!-- Vercel Web Analytics -->
  <script type="module">
    import { inject } from '/_vercel/analytics/index.mjs';
    inject();
  </script>
</head>
<body class="antialiased dark min-h-screen bg-[var(--bg)] text-[var(--text)]">
  <div class="admin-shell-bg min-h-screen">
    <!-- Header -->
    <header class="sticky top-0 z-50 border-b border-[var(--border)] bg-[var(--card)]/95 backdrop-blur">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="h-10 w-10 rounded-xl bg-cyan-400/10 flex items-center justify-center text-cyan-400">
              <i class="fas fa-shield-halved text-sm"></i>
            </div>
            <div>
              <div class="logo-font text-lg font-semibold">GovHub Admin</div>
              <div class="text-xs opacity-60">Moderation Dashboard</div>
            </div>
          </div>
          <div class="flex items-center gap-2">
            <a href="index.html" class="px-3 py-2 rounded-lg border border-[var(--border)] hover:bg-[var(--bg)] transition text-sm">
              <i class="fas fa-arrow-left mr-2 text-[var(--accent)]"></i>Site
            </a>
            <button id="btn-refresh" class="px-3 py-2 rounded-lg bg-[var(--accent)] text-[#0a0f1c] text-sm font-medium hover:bg-cyan-300 transition">
              <i class="fas fa-rotate mr-1"></i>
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
      <!-- Login View -->
      <div id="login-view" class="max-w-md mx-auto py-12">
        <div class="text-center mb-8">
          <div class="mx-auto h-16 w-16 rounded-2xl bg-cyan-400/10 flex items-center justify-center text-cyan-400 mb-4">
            <i class="fas fa-lock text-2xl"></i>
          </div>
          <h1 class="text-2xl font-bold">Admin Sign In</h1>
          <p class="mt-2 text-sm opacity-60">Sign in to access the moderation dashboard</p>
        </div>

        <div id="login-error" class="hidden mb-4 rounded-xl border border-red-400/25 bg-red-500/10 px-4 py-3 text-sm text-red-300"></div>

        <div class="rounded-2xl border border-[var(--border)] bg-[var(--card)]/50 p-6 space-y-4">
          <div>
            <label class="block text-sm font-medium mb-2">Email</label>
            <input id="admin-email" type="email" placeholder="admin@example.com" class="w-full rounded-xl border border-[var(--border)] bg-[var(--bg)] px-4 py-3 text-sm outline-none focus:border-cyan-400 transition">
          </div>
          <div>
            <label class="block text-sm font-medium mb-2">Password</label>
            <input id="admin-pass" type="password" placeholder="Password" class="w-full rounded-xl border border-[var(--border)] bg-[var(--bg)] px-4 py-3 text-sm outline-none focus:border-cyan-400 transition">
          </div>
          <button id="btn-signin" class="w-full rounded-xl bg-[var(--accent)] px-4 py-3 font-medium text-[#0a0f1c] hover:bg-cyan-300 transition">
            Sign In
          </button>
        </div>
      </div>

      <!-- Dashboard View -->
      <div id="dashboard-view" class="hidden">
        <!-- User Info Bar -->
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
          <div class="flex items-center gap-3">
            <div class="h-10 w-10 rounded-full bg-emerald-400/10 flex items-center justify-center text-emerald-400">
              <i class="fas fa-user"></i>
            </div>
            <div>
              <div id="user-email" class="font-medium text-sm">—</div>
              <div class="text-xs opacity-60">Admin access</div>
            </div>
          </div>
          <button id="btn-signout" class="px-4 py-2 rounded-lg border border-red-400/25 bg-red-500/10 text-red-300 text-sm hover:bg-red-500/20 transition">
            <i class="fas fa-sign-out-alt mr-2"></i>Sign Out
          </button>
        </div>

        <!-- Metrics -->
        <div id="metrics" class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6"></div>

        <!-- Tabs -->
        <div class="flex items-center gap-2 mb-4">
          <button class="admin-tab-btn px-4 py-2 rounded-lg text-sm font-medium transition" data-view="submissions">Community Reports</button>
          <button class="admin-tab-btn px-4 py-2 rounded-lg text-sm font-medium transition" data-view="suggestions">Office Suggestions</button>
        </div>

        <!-- Filter & Results -->
        <div class="rounded-2xl border border-[var(--border)] bg-[var(--card)]/50">
          <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 p-4 border-b border-[var(--border)]">
            <select id="status-filter" class="rounded-lg border border-[var(--border)] bg-[var(--bg)] px-3 py-2 text-sm outline-none">
              <option value="pending">Pending</option>
              <option value="approved">Approved</option>
              <option value="rejected">Rejected</option>
            </select>
            <div id="results-summary" class="text-sm opacity-60"></div>
          </div>
          <div id="results" class="p-4"></div>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="supabase-client.js"></script>
  <script type="module" src="admin.js"></script>
</body>
</html>
